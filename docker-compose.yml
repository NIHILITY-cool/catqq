services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - MODE=astrbot
    ports:
      - "127.0.0.1:6099:6099"
    volumes:
      - ./data:/AstrBot/data
      - ./napcat/config:/app/napcat/config
      - ./ntqq:/app/.config/QQ
    networks:
      - astrbot_network

  astrbot:
    image: soulter/astrbot:latest
    container_name: astrbot
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - CATQQ_CONTACTS=${CATQQ_CONTACTS:-你的QQ号|主人|玖玖最重要的人}
      - CATQQ_ALLOWED_USERS=${CATQQ_ALLOWED_USERS:-你的QQ号}
      - CATQQ_MORNING_HOUR=${CATQQ_MORNING_HOUR:-8}
      - CATQQ_NIGHT_HOUR=${CATQQ_NIGHT_HOUR:-23}
      - CATQQ_USER_IDENTITY=${CATQQ_USER_IDENTITY:-你的QQ号:主人}
      - CATQQ_PROACTIVE_ENABLED=${CATQQ_PROACTIVE_ENABLED:-false}
      - CATQQ_PROACTIVE_TARGET=${CATQQ_PROACTIVE_TARGET:-}
      - CATQQ_PROACTIVE_ACTIVE_HOURS=${CATQQ_PROACTIVE_ACTIVE_HOURS:-10-23}
      - CATQQ_PROACTIVE_MAX_PER_DAY=${CATQQ_PROACTIVE_MAX_PER_DAY:-3}
      - CATQQ_PROACTIVE_MIN_GAP_HOURS=${CATQQ_PROACTIVE_MIN_GAP_HOURS:-3}
      - CATQQ_PROACTIVE_INACTIVE_HOURS=${CATQQ_PROACTIVE_INACTIVE_HOURS:-6}
      - CATQQ_PROACTIVE_AFTER_REPLY_COOLDOWN_MINUTES=${CATQQ_PROACTIVE_AFTER_REPLY_COOLDOWN_MINUTES:-60}
      - CATQQ_PROACTIVE_RANDOM_CHANCE=${CATQQ_PROACTIVE_RANDOM_CHANCE:-0.08}
    ports:
      - "127.0.0.1:6185:6185"
    volumes:
      - ./data:/AstrBot/data
    networks:
      - astrbot_network

networks:
  astrbot_network:
    driver: bridge
